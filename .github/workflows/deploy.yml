name: Deploy Client and Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Client and Server
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install dependencies for the client
      - name: Install client dependencies
        working-directory: client
        run: npm install

      # Step 4: Build the client
      - name: Build client
        working-directory: client
        run: npm run build

      # Step 5: Install dependencies for the server
      - name: Install server dependencies
        working-directory: server
        run: npm install

      # Step 6: Prepare SSH for server deployment
      - name: Prepare SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -e
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName $DEPLOY_HOST
            User $DEPLOY_USER
            Port $PORT
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      # Step 7: Verify SSH connection
      - name: Verify SSH connection
        run: ssh -o BatchMode=yes deploy-target "echo SSH connection successful"

      # Step 8: Deploy server and client
      - name: Deploy server and client
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e

          # Backup .env if it exists (contains DB credentials)
          ssh deploy-target "if [ -f \"$DEPLOY_PATH/.env\" ]; then cp \"$DEPLOY_PATH/.env\" /tmp/.env.brynas.bak; fi"

          # Clean deploy directory
          ssh deploy-target "mkdir -p \"$DEPLOY_PATH\" && find \"$DEPLOY_PATH\" -mindepth 1 -maxdepth 1 -exec rm -rf {} +"

          # Deploy server files
          tar -C server -czf - . | ssh deploy-target "tar -xzf - -C \"$DEPLOY_PATH\""

          # Deploy client build to public/
          ssh deploy-target "mkdir -p \"$DEPLOY_PATH/public\""
          tar -C client/dist -czf - . | ssh deploy-target "tar -xzf - -C \"$DEPLOY_PATH/public\""

          # Deploy .htaccess from repo root
          scp .htaccess deploy-target:"$DEPLOY_PATH/.htaccess"

          # Copy index.html to root for directory index
          ssh deploy-target "cp \"$DEPLOY_PATH/public/index.html\" \"$DEPLOY_PATH/index.html\""

          # Restore .env backup
          ssh deploy-target "if [ -f /tmp/.env.brynas.bak ]; then cp /tmp/.env.brynas.bak \"$DEPLOY_PATH/.env\" && rm /tmp/.env.brynas.bak; fi"

          # Install production deps and restart PM2
          ssh deploy-target "export FNM_PATH=\"\$HOME/.local/share/fnm\" && export PATH=\"\$FNM_PATH:\$PATH\" && eval \"\$(fnm env --shell bash)\" && fnm use 20 && cd \"$DEPLOY_PATH\" && npm install --production && (pm2 restart brynasbilservice 2>/dev/null || pm2 start index.js --name brynasbilservice)"